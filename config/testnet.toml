# Аукцион — testnet profile.
#
# Ключи ровно по docs/game-spec.md §11:
#   crown_index — principal книги (вес голосов)
#   threshold_key, voting_period, operator_wallet
#   per-chain: id, factory, domain, source, consensus, fee_bps, fee_wallet
#
# factory / domain копируются из crown-factory/deploy/testnet.toml,
# source / consensus — по смыслу из конфига ядра; этот репозиторий их не
# порождает. crown_index — локальная канистра: principal зависит от деплоя
# и подставляется через init-оверрайд (на mainnet-профиле оверрайды
# трапаются). threshold_key — имя threshold-ключа среды; локальная реплика
# dfx и PocketIC дают то же имя, что прод: key_1.

threshold_key = "key_1"
# Сжатые часы devnet: голосование 2 минуты. Прод-значение — час,
# в mainnet.toml; аукцион несёт свой профиль с рождения.
voting_period = 120
# Кошелёк оператора платформы (game-spec §13): единственная его власть —
# вернуть деньги владельцам. На devnet — ключ из ~/.cache/crown-e2e/operator.json.
operator_wallet = "9KggtYo5QpWgZLCfQCJx3uuEMRrHmjhRnZRGq15AjCKt"

[[chain]]
id      = "solana-devnet"
factory = "83f7ziVs5VeQ8xiDka8zczbfJT4WcxsXQ18cqWwmV5ur"
domain  = "crown:two-outcome:solana-devnet"
# Чтение чейна (game-spec §4): вариант источников SOL RPC-канистры и
# стратегия агрегации провайдеров. Custom легален только в testnet-профиле.
source    = "Default:Devnet"
consensus = "3-of-5"
# Прейскурант игры (factory-spec §2.1): поля рождения каждого её эскроу,
# часть соли. Комиссию снимает сам эскроу при расчёте; возвраты бесплатны.
fee_bps    = 300
fee_wallet = "3it64t7KXNip1C1BRYNh8ygeKyujWnaQrPSj3hV9TWbE"
